name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  aes-unit-test:
    name: AES128 C ユニットテスト
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: ビルドして実行
        run: make -C firmware/tests

      - name: クリーンアップ
        if: always()
        run: make -C firmware/tests clean
